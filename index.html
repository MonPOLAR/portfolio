<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .error-code { font-size: 8rem; margin: 0; }
        /* Le bouton est invisible par défaut, il apparaît au survol ou reste caché */
        .secret-link { color: #111; text-decoration: none; cursor: default; margin-top: 20px; }
        .secret-link:hover { color: #222; } 
    </style>
</head>
<body>
    <h1 class="error-code">404</h1>
    <p>Not Found: The requested URL was not found on this server.</p>
    <hr width="30%">
    <p>Apache/2.4.41 (Ubuntu) Server at localhost Port 80</p>
    
    <a href="home.html" class="secret-link">.</a>
</body>
</html>
