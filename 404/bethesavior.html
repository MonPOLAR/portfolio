<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SYSTEM LOGIN</title>
  <link rel="icon" type="image/png" href="../storage/favicon.jpg">
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="page-bethesavior">

  <a href="../index.html" class="control-btn" style="position:fixed;top:40px;right:40px;">[ EXIT ]</a>

  <div class="login-box">
    <h2>[ RESTRICTED ACCESS ]</h2>

    <div class="input-group">
      <label for="username">USERNAME</label>
      <input type="text" id="username" autocomplete="off">
    </div>

    <div class="input-group">
      <label for="password">PASSWORD</label>
      <input type="password" id="password">
    </div>

    <div class="hint-btn" id="hint-btn" title="Need a hint?">💡</div>
    <div class="hint-popup" id="hint-popup">
      <div class="hint-header">
        <p class="hint-title">&gt; HINT_UNLOCKED</p>
        <div class="hint-controls">
          <span class="hint-close" id="hint-close">✕</span>
        </div>
      </div>
      <p class="hint-text" id="hint-text">Have you checked the site before saving ? Keep a sharp eye on the CLI outputs...</p>
    </div>

    <button class="login-btn">IDENTIFY</button>

    <div id="error-msg">🚫 ACCESS_DENIED: INVALID_CREDENTIALS</div>
  </div>

  <script src="../main.js"></script>
</body>
</html>
